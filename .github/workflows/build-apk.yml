name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Create package.json and install Capacitor
      run: |
        npm init -y > capacitor_init.log 2>&1
        npm install @capacitor/core @capacitor/cli @capacitor/android >> capacitor_init.log 2>&1
        npx cap init "Kantin Unisla" "com.unisla.kantin" --web-dir=sistem_kantin >> capacitor_init.log 2>&1
        npx cap add android >> capacitor_init.log 2>&1

    - name: Add Camera Permission to AndroidManifest
      run: |
        node -e "const fs = require('fs'); let data = fs.readFileSync('android/app/src/main/AndroidManifest.xml', 'utf8'); data = data.replace('</manifest>', '    <uses-permission android:name=\"android.permission.CAMERA\" />\n    <uses-feature android:name=\"android.hardware.camera\" />\n    <uses-feature android:name=\"android.hardware.camera.autofocus\" />\n</manifest>'); fs.writeFileSync('android/app/src/main/AndroidManifest.xml', data);" > manifest_update.log 2>&1

    - name: Upgrade Gradle Version in Wrapper properties
      run: |
        node -e "const fs = require('fs'); let data = fs.readFileSync('android/gradle/wrapper/gradle-wrapper.properties', 'utf8'); data = data.replace('gradle-8.2.1-all.zip', 'gradle-8.7-all.zip'); fs.writeFileSync('android/gradle/wrapper/gradle-wrapper.properties', data);"

    - name: Sync Capacitor
      run: |
        npx cap sync > capacitor_sync.log 2>&1

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Build APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug > ../gradle_build.log 2>&1

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: kantin-unisla-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk

    - name: Upload Logs on Failure
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: |
          *.log
