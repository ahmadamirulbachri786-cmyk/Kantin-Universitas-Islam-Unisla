name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Create package.json and install Capacitor
      run: |
        npm init -y
        npm install @capacitor/core@6 @capacitor/cli@6 @capacitor/android@6

    - name: Initialize Capacitor
      run: |
        npx cap init "Kantin Unisla" "com.unisla.kantin" --web-dir=sistem_kantin

    - name: Add Android platform
      run: |
        npx cap add android

    - name: Add Camera Permission to AndroidManifest
      run: |
        MANIFEST="android/app/src/main/AndroidManifest.xml"
        sed -i 's|</manifest>|    <uses-permission android:name="android.permission.CAMERA" />\n    <uses-feature android:name="android.hardware.camera" android:required="false" />\n    <uses-feature android:name="android.hardware.camera.autofocus" android:required="false" />\n</manifest>|' "$MANIFEST"

    - name: Upgrade Gradle to 8.11.1
      run: |
        PROPS="android/gradle/wrapper/gradle-wrapper.properties"
        sed -i 's|gradle-.*-all.zip|gradle-8.11.1-all.zip|' "$PROPS"
        cat "$PROPS"

    - name: Upgrade Android Gradle Plugin to 8.7.3
      run: |
        BUILD_GRADLE="android/build.gradle"
        sed -i "s|classpath 'com.android.tools.build:gradle:.*'|classpath 'com.android.tools.build:gradle:8.7.3'|" "$BUILD_GRADLE"
        cat "$BUILD_GRADLE"

    - name: Set compileSdk and targetSdk to 34
      run: |
        APP_GRADLE="android/app/build.gradle"
        sed -i 's|compileSdkVersion.*|compileSdk 34|' "$APP_GRADLE"
        sed -i 's|targetSdkVersion.*|targetSdk 34|' "$APP_GRADLE"
        cat "$APP_GRADLE"

    - name: Sync Capacitor
      run: |
        npx cap sync android

    - name: Build Debug APK
      working-directory: android
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon --stacktrace

    - name: Upload APK Artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: kantin-unisla-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk

    - name: Upload Logs on Failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: |
          android/build.gradle
          android/app/build.gradle
          android/gradle/wrapper/gradle-wrapper.properties
