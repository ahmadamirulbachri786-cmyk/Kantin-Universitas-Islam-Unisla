name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: Install Capacitor
      run: |
        npm init -y
        npm install @capacitor/core@latest @capacitor/cli@latest @capacitor/android@latest

    - name: Initialize Capacitor
      run: |
        npx cap init "Kantin Unisla" "com.unisla.kantin" --web-dir=sistem_kantin

    - name: Add Android platform
      run: |
        npx cap add android

    - name: Add Camera Permission
      run: |
        MANIFEST="android/app/src/main/AndroidManifest.xml"
        sed -i 's|</manifest>|    <uses-permission android:name="android.permission.CAMERA" />\n    <uses-feature android:name="android.hardware.camera" android:required="false" />\n    <uses-feature android:name="android.hardware.camera.autofocus" android:required="false" />\n</manifest>|' "$MANIFEST"

    - name: Sync Capacitor
      run: |
        npx cap sync android

    - name: Build Debug APK
      working-directory: android
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon --stacktrace

    - name: List all build outputs
      if: always()
      run: |
        echo "=== All APK files ==="
        find . -name "*.apk" -type f 2>/dev/null || echo "No APK files found anywhere"
        echo ""
        echo "=== All AAB files ==="
        find . -name "*.aab" -type f 2>/dev/null || echo "No AAB files found"
        echo ""
        echo "=== Build outputs directory ==="
        ls -laR android/app/build/outputs/ 2>/dev/null || echo "No outputs directory found"

    - name: Upload APK Artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: kantin-unisla-apk
        path: |
          android/app/build/outputs/
        if-no-files-found: warn

    - name: Upload Logs on Failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: |
          gradle_output.log
          android/build.gradle
          android/app/build.gradle
          android/gradle/wrapper/gradle-wrapper.properties
