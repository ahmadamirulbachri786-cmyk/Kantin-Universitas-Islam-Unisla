name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: Install Capacitor v6
      run: |
        npm init -y
        npm install @capacitor/core@6 @capacitor/cli@6 @capacitor/android@6

    - name: Initialize Capacitor
      run: |
        npx cap init "Kantin Unisla" "com.unisla.kantin" --web-dir=sistem_kantin

    - name: Add Android platform
      run: |
        npx cap add android

    - name: Add Camera Permission
      run: |
        MANIFEST="android/app/src/main/AndroidManifest.xml"
        sed -i 's|</manifest>|    <uses-permission android:name="android.permission.CAMERA" />\n    <uses-feature android:name="android.hardware.camera" android:required="false" />\n    <uses-feature android:name="android.hardware.camera.autofocus" android:required="false" />\n</manifest>|' "$MANIFEST"

    - name: Fix Gradle version for JDK 17 compatibility
      run: |
        # Upgrade Gradle wrapper to 8.4 (compatible with AGP 8.2.1 from Cap 6)
        PROPS="android/gradle/wrapper/gradle-wrapper.properties"
        sed -i 's|gradle-.*-all.zip|gradle-8.4-all.zip|' "$PROPS"
        echo "=== gradle-wrapper.properties ==="
        cat "$PROPS"
        echo ""
        echo "=== android/build.gradle ==="
        cat android/build.gradle
        echo ""
        echo "=== android/app/build.gradle ==="
        cat android/app/build.gradle

    - name: Sync Capacitor
      run: |
        npx cap sync android

    - name: Build Debug APK
      working-directory: android
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon

    - name: Upload APK Artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: kantin-unisla-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
        if-no-files-found: error

    - name: Upload full outputs on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-debug-logs
        path: |
          android/build.gradle
          android/app/build.gradle
          android/gradle/wrapper/gradle-wrapper.properties
        if-no-files-found: warn
