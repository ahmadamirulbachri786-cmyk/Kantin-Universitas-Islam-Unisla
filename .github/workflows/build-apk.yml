name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: Install Capacitor
      run: |
        npm init -y
        npm install @capacitor/core@latest @capacitor/cli@latest @capacitor/android@latest

    - name: Initialize Capacitor
      run: |
        npx cap init "Kantin Unisla" "com.unisla.kantin" --web-dir=sistem_kantin

    - name: Add Android platform
      run: |
        npx cap add android

    - name: Add Camera Permission
      run: |
        MANIFEST="android/app/src/main/AndroidManifest.xml"
        sed -i 's|</manifest>|    <uses-permission android:name="android.permission.CAMERA" />\n    <uses-feature android:name="android.hardware.camera" android:required="false" />\n    <uses-feature android:name="android.hardware.camera.autofocus" android:required="false" />\n</manifest>|' "$MANIFEST"

    - name: Debug - Show generated Gradle files
      run: |
        echo "=== android/build.gradle ==="
        cat android/build.gradle
        echo ""
        echo "=== android/app/build.gradle ==="
        cat android/app/build.gradle
        echo ""
        echo "=== gradle-wrapper.properties ==="
        cat android/gradle/wrapper/gradle-wrapper.properties
        echo ""
        echo "=== Java version ==="
        java -version
        echo ""
        echo "=== Node version ==="
        node -v

    - name: Sync Capacitor
      run: |
        npx cap sync android

    - name: Build Debug APK
      working-directory: android
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee ../gradle_output.log

    - name: Find APK files
      if: success()
      run: |
        echo "=== Searching for APK files ==="
        find . -name "*.apk" -type f 2>/dev/null
        echo ""
        echo "=== Searching in android/app/build ==="
        find android/app/build -type f -name "*.apk" 2>/dev/null || echo "No APK found in android/app/build"
        echo ""
        echo "=== Full android build outputs ==="
        ls -la android/app/build/outputs/ 2>/dev/null || echo "No outputs directory"
        ls -la android/app/build/outputs/apk/ 2>/dev/null || echo "No apk directory"
        ls -laR android/app/build/outputs/apk/ 2>/dev/null || echo "No apk subdirectories"

    - name: Upload APK Artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: kantin-unisla-apk
        path: |
          android/app/build/outputs/apk/**/*.apk
        if-no-files-found: warn

    - name: Upload Logs on Failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: |
          gradle_output.log
          android/build.gradle
          android/app/build.gradle
          android/gradle/wrapper/gradle-wrapper.properties
