<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kantin UNISLA - Pesan Makanan</title>
    <link rel="stylesheet" href="styles.css">
    <script src="app.js"></script>
</head>
<body style="background-color: #f0f2f5;">

    <div class="mobile-wrapper">
        <!-- HEADER -->
        <header class="mobile-header">
            <div>
                <h2 id="header-title">Kantin UNISLA</h2>
                <div style="font-size: 0.75rem; color: rgba(255,255,255,0.8);" id="header-subtitle">Meja Anda: </div>
            </div>
            <div class="portal-card-icon" style="margin:0; font-size:1.5rem; animation:none;" id="header-icon">🍔</div>
        </header>

        <!-- MAIN CONTENT AREA -->
        <div class="mobile-content" id="main-content">
            <!-- TAB 1: DAFTAR WARUNG -->
            <div id="view-merchants">
                <h3 style="margin-bottom: 15px; font-size: 1.1rem;">Pilih Warung</h3>
                <div class="merchant-list" id="merchant-list-container">
                    <!-- Injected via JS -->
                </div>
            </div>

            <!-- TAB 2: DAFTAR MENU -->
            <div id="view-menus" class="hidden">
                <button class="btn btn-sm btn-secondary" onclick="goBackToMerchants()" style="margin-bottom: 15px;">
                    &larr; Kembali ke Daftar Warung
                </button>
                
                <div class="card" style="margin-bottom: 20px; padding: 15px; display:flex; align-items:center; gap:15px;">
                    <div class="food-svg-container" id="selected-merchant-icon"></div>
                    <div>
                        <h3 id="selected-merchant-name" style="margin:0;">-</h3>
                        <p id="selected-merchant-desc" style="font-size:0.8rem; color:var(--text-muted); margin:0;"></p>
                    </div>
                </div>

                <div class="menu-filter" id="menu-categories">
                    <button class="filter-pill active" onclick="filterCategory('Semua')">Semua</button>
                    <button class="filter-pill" onclick="filterCategory('Makanan')">Makanan</button>
                    <button class="filter-pill" onclick="filterCategory('Minuman')">Minuman</button>
                    <button class="filter-pill" onclick="filterCategory('Cemilan')">Cemilan</button>
                </div>

                <div class="menu-list" id="menu-list-container">
                    <!-- Injected via JS -->
                </div>
            </div>

            <!-- TAB 3: PELACAKAN PESANAN -->
            <div id="view-tracking" class="hidden">
                <h3 style="margin-bottom: 15px; font-size: 1.1rem;">Pesanan Anda</h3>
                <div id="tracking-container">
                    <!-- Injected via JS -->
                </div>
            </div>
        </div>

        <!-- FLOATING CART BUTTON -->
        <div id="cart-floating" class="cart-floating-btn hidden" onclick="openCartModal()">
            <div>
                <h4>🛒 Lihat Keranjang</h4>
                <div style="font-size: 0.8rem; opacity: 0.9;" id="cart-item-count">0 Item</div>
            </div>
            <span id="cart-total-price">Rp 0</span>
        </div>

        <!-- FOOTER NAVIGATION -->
        <nav class="mobile-footer-nav">
            <button class="nav-item active" id="nav-home" onclick="switchMainTab('home')">
                <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                Pesan
            </button>
            <button class="nav-item" id="nav-track" onclick="switchMainTab('track')">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                Pesanan Saya
            </button>
        </nav>
    </div>

    <!-- MODAL KERANJANG & CHECKOUT -->
    <div id="cart-modal" class="modal-overlay hidden" style="align-items: flex-end;">
        <div class="modal-content" style="border-radius: var(--radius-lg) var(--radius-lg) 0 0; max-height: 85vh; display:flex; flex-direction:column;">
            <button class="modal-close" onclick="closeCartModal()">&times;</button>
            <h2 style="margin-bottom: 20px;">Keranjang Pesanan</h2>
            
            <div id="cart-items-container" style="flex:1; overflow-y:auto; margin-bottom: 20px;">
                <!-- Injected via JS -->
            </div>

            <div style="border-top: 1px solid var(--border-color); padding-top: 15px; margin-bottom:20px;">
                <h4 style="margin-bottom:10px;">Metode Pembayaran</h4>
                <div class="payment-options">
                    <div class="payment-card active" id="pay-qris" onclick="selectPayment('qris')">
                        <strong>QRIS</strong><br>
                        <span style="font-size:0.8rem; color:var(--text-muted);">Scan via e-Wallet/M-Banking</span>
                    </div>
                    <div class="payment-card" id="pay-cash" onclick="selectPayment('cash')">
                        <strong>Tunai (Cash)</strong><br>
                        <span style="font-size:0.8rem; color:var(--text-muted);">Bayar di Kasir Warung</span>
                    </div>
                </div>
            </div>

            <button class="btn btn-primary" style="width: 100%; padding: 15px; font-size: 1.1rem;" onclick="handleCheckout()">
                Pesan Sekarang - <span id="checkout-total-price">Rp 0</span>
            </button>
        </div>
    </div>

    <!-- TOAST NOTIFICATION CONTAINER -->
    <div id="toast-container" class="toast-container" style="top:auto; bottom: 80px; width: 100%; max-width: 480px; left: 50%; transform: translateX(-50%); padding:0 20px;"></div>
    
    <!-- AUDIO FOR NOTIFICATIONS -->
    <audio id="chime-audio" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <script>
        // STATE
        let tableNumber = 12;
        let selectedMerchant = null;
        let currentCategory = 'Semua';
        let cart = [];
        let paymentMethod = 'qris';
        let previousOrdersStr = '';

        window.addEventListener('DOMContentLoaded', () => {
            // Get Table Number from URL
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.has('tableNumber')) {
                tableNumber = parseInt(urlParams.get('tableNumber'));
            }
            document.getElementById('header-subtitle').textContent = `Meja Anda: ${tableNumber}`;

            renderMerchants();
            renderOrderTracking(); // Init tracking
            
            // Listen to cross-tab updates
            window.addEventListener('storage', handleStorageUpdate);
            window.addEventListener('storage_updated', handleStorageUpdate);
        });

        function handleStorageUpdate() {
            if (document.getElementById('view-merchants').classList.contains('hidden') === false) {
                renderMerchants();
            } else if (selectedMerchant) {
                renderMenus();
            }
            checkOrderStatusChanges();
        }

        // --- NAVIGATION ---
        function switchMainTab(tab) {
            document.getElementById('nav-home').classList.remove('active');
            document.getElementById('nav-track').classList.remove('active');
            
            if (tab === 'home') {
                document.getElementById('nav-home').classList.add('active');
                document.getElementById('view-tracking').classList.add('hidden');
                
                if (selectedMerchant) {
                    document.getElementById('view-menus').classList.remove('hidden');
                    document.getElementById('view-merchants').classList.add('hidden');
                } else {
                    document.getElementById('view-merchants').classList.remove('hidden');
                    document.getElementById('view-menus').classList.add('hidden');
                }
                updateCartFloatingBtn();
            } else {
                document.getElementById('nav-track').classList.add('active');
                document.getElementById('view-merchants').classList.add('hidden');
                document.getElementById('view-menus').classList.add('hidden');
                document.getElementById('cart-floating').classList.add('hidden');
                document.getElementById('view-tracking').classList.remove('hidden');
                renderOrderTracking();
            }
        }

        // --- MERCHANTS ---
        function renderMerchants() {
            const merchants = DB.getMerchants().filter(m => m.aktif);
            const container = document.getElementById('merchant-list-container');
            
            if (merchants.length === 0) {
                container.innerHTML = `<div style="text-align:center; padding:30px; color:var(--text-muted);">Belum ada warung yang buka.</div>`;
                return;
            }

            container.innerHTML = merchants.map(m => `
                <div class="merchant-item" onclick="selectMerchant('${m.id}')">
                    <div class="food-svg-container">
                        ${DB.getFoodSvg(m.logo)}
                    </div>
                    <div class="merchant-item-info">
                        <h3>${m.nama}</h3>
                        <p>${m.deskripsi}</p>
                    </div>
                </div>
            `).join('');
        }

        function selectMerchant(merchantId) {
            // Check if cart has items from different merchant
            if (cart.length > 0 && cart[0].merchantId !== merchantId) {
                if(confirm('Anda memiliki pesanan dari warung lain di keranjang. Pindah warung akan mengosongkan keranjang. Lanjutkan?')) {
                    cart = [];
                } else {
                    return;
                }
            }
            
            selectedMerchant = DB.getMerchantById(merchantId);
            document.getElementById('selected-merchant-name').textContent = selectedMerchant.nama;
            document.getElementById('selected-merchant-desc').textContent = selectedMerchant.deskripsi;
            document.getElementById('selected-merchant-icon').innerHTML = DB.getFoodSvg(selectedMerchant.logo);
            
            document.getElementById('view-merchants').classList.add('hidden');
            document.getElementById('view-menus').classList.remove('hidden');
            
            renderMenus();
            updateCartFloatingBtn();
        }

        function goBackToMerchants() {
            selectedMerchant = null;
            document.getElementById('view-menus').classList.add('hidden');
            document.getElementById('view-merchants').classList.remove('hidden');
            updateCartFloatingBtn();
        }

        // --- MENUS ---
        function filterCategory(cat) {
            currentCategory = cat;
            document.querySelectorAll('.filter-pill').forEach(btn => {
                if(btn.textContent === cat) btn.classList.add('active');
                else btn.classList.remove('active');
            });
            renderMenus();
        }

        function renderMenus() {
            if (!selectedMerchant) return;
            let menus = DB.getMenusByMerchant(selectedMerchant.id);
            
            if (currentCategory !== 'Semua') {
                menus = menus.filter(m => m.kategori === currentCategory);
            }

            const container = document.getElementById('menu-list-container');
            
            if (menus.length === 0) {
                container.innerHTML = `<div style="text-align:center; padding:20px; color:var(--text-muted);">Tidak ada menu di kategori ini.</div>`;
                return;
            }

            container.innerHTML = menus.map(m => {
                const cartItem = cart.find(c => c.id === m.id);
                const qty = cartItem ? cartItem.qty : 0;
                
                let controlsHtml = '';
                if (!m.stok) {
                    controlsHtml = `<span style="color:var(--danger); font-size:0.8rem; font-weight:700;">HABIS</span>`;
                } else if (qty > 0) {
                    controlsHtml = `
                        <div class="qty-control">
                            <button class="qty-btn" onclick="updateCart('${m.id}', -1)">-</button>
                            <span class="qty-val">${qty}</span>
                            <button class="qty-btn" onclick="updateCart('${m.id}', 1)">+</button>
                        </div>
                    `;
                } else {
                    controlsHtml = `<button class="btn btn-sm btn-accent" onclick="updateCart('${m.id}', 1)">+ Tambah</button>`;
                }

                return `
                <div class="menu-item ${!m.stok ? 'out-of-stock' : ''}">
                    <div class="menu-item-img">${DB.getFoodSvg(m.iconKey)}</div>
                    <div class="menu-item-info">
                        <div>
                            <h4 class="menu-item-title">${m.nama}</h4>
                            <p class="menu-item-desc">${m.deskripsi}</p>
                        </div>
                        <div class="menu-item-footer">
                            <span class="menu-item-price">${formatRp(m.harga)}</span>
                            ${controlsHtml}
                        </div>
                    </div>
                </div>
                `;
            }).join('');
        }

        // --- CART ---
        function updateCart(menuId, change) {
            const menu = DB.getMenus().find(m => m.id === menuId);
            if (!menu || !menu.stok) return;

            const existingIdx = cart.findIndex(c => c.id === menuId);
            
            if (existingIdx > -1) {
                cart[existingIdx].qty += change;
                if (cart[existingIdx].qty <= 0) {
                    cart.splice(existingIdx, 1);
                }
            } else if (change > 0) {
                cart.push({ ...menu, qty: 1, notes: '' });
            }

            renderMenus();
            updateCartFloatingBtn();
            if(!document.getElementById('cart-modal').classList.contains('hidden')){
                renderCartItems();
            }
        }

        function updateCartFloatingBtn() {
            const floating = document.getElementById('cart-floating');
            // Show only if there are items AND we are not on tracking tab
            if (cart.length > 0 && document.getElementById('view-tracking').classList.contains('hidden')) {
                const totalQty = cart.reduce((sum, item) => sum + item.qty, 0);
                const totalPrice = cart.reduce((sum, item) => sum + (item.qty * item.harga), 0);
                
                document.getElementById('cart-item-count').textContent = `${totalQty} Item`;
                document.getElementById('cart-total-price').textContent = formatRp(totalPrice);
                floating.classList.remove('hidden');
            } else {
                floating.classList.add('hidden');
            }
        }

        function openCartModal() {
            renderCartItems();
            document.getElementById('cart-modal').classList.remove('hidden');
        }

        function closeCartModal() {
            document.getElementById('cart-modal').classList.add('hidden');
        }

        function renderCartItems() {
            const container = document.getElementById('cart-items-container');
            const totalPrice = cart.reduce((sum, item) => sum + (item.qty * item.harga), 0);
            
            if (cart.length === 0) {
                container.innerHTML = `<div style="text-align:center; color:var(--text-muted); margin-top:20px;">Keranjang kosong</div>`;
                document.getElementById('checkout-total-price').textContent = 'Rp 0';
                return;
            }

            container.innerHTML = cart.map((item, index) => `
                <div class="cart-item">
                    <div class="cart-item-header">
                        <span class="cart-item-title">${item.nama}</span>
                        <div class="qty-control">
                            <button class="qty-btn" onclick="updateCart('${item.id}', -1)">-</button>
                            <span class="qty-val">${item.qty}</span>
                            <button class="qty-btn" onclick="updateCart('${item.id}', 1)">+</button>
                        </div>
                    </div>
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <span class="cart-item-price">${formatRp(item.harga * item.qty)}</span>
                        <input type="text" class="cart-notes-input" placeholder="Catatan (Minta pedas, dll)" 
                               value="${item.notes}" onchange="updateNotes(${index}, this.value)" style="width: 60%;">
                    </div>
                </div>
            `).join('');
            
            document.getElementById('checkout-total-price').textContent = formatRp(totalPrice);
        }

        function updateNotes(index, value) {
            if (cart[index]) {
                cart[index].notes = value;
            }
        }

        function selectPayment(method) {
            paymentMethod = method;
            document.getElementById('pay-qris').classList.remove('active');
            document.getElementById('pay-cash').classList.remove('active');
            document.getElementById(`pay-${method}`).classList.add('active');
        }

        function handleCheckout() {
            if (cart.length === 0) return;
            
            const totalPrice = cart.reduce((sum, item) => sum + (item.qty * item.harga), 0);
            const orderData = {
                merchantId: cart[0].merchantId,
                tableNumber: tableNumber,
                items: cart,
                totalPrice: totalPrice,
                paymentMethod: paymentMethod
            };

            DB.createOrder(orderData);
            
            // Show QRIS simulation if needed, but for now just success
            cart = [];
            closeCartModal();
            updateCartFloatingBtn();
            
            showToast('Pesanan berhasil dikirim ke warung!', 'success');
            
            // Switch to tracking
            switchMainTab('track');
        }

        // --- ORDER TRACKING ---
        function renderOrderTracking() {
            const myOrders = DB.getOrders().filter(o => o.tableNumber === tableNumber)
                             .sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));
                             
            const container = document.getElementById('tracking-container');
            
            if (myOrders.length === 0) {
                container.innerHTML = `
                    <div style="text-align:center; padding:40px 20px; color:var(--text-muted);">
                        <div style="font-size:3rem; margin-bottom:15px;">🍽️</div>
                        <p>Anda belum memiliki pesanan.</p>
                        <button class="btn btn-primary" onclick="switchMainTab('home')" style="margin-top:15px;">Pesan Sekarang</button>
                    </div>`;
                return;
            }

            container.innerHTML = myOrders.map(order => {
                const merchant = DB.getMerchantById(order.merchantId);
                const time = new Date(order.timestamp).toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
                
                let progress = 25;
                let statusText = 'Menunggu Konfirmasi';
                let statusColor = 'var(--warning)';
                
                if (order.status === 'processed') { progress = 50; statusText = 'Sedang Dibuat'; statusColor = 'var(--info)'; }
                if (order.status === 'ready') { progress = 75; statusText = 'Siap Diambil'; statusColor = 'var(--primary)'; }
                if (order.status === 'completed') { progress = 100; statusText = 'Selesai'; statusColor = 'var(--success)'; }

                return `
                <div class="tracking-card">
                    <div class="tracking-header">
                        <span class="tracking-shop">${merchant ? merchant.nama : 'Warung'}</span>
                        <span class="tracking-time">${time}</span>
                    </div>
                    
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <span style="font-weight:600; color:${statusColor};">${statusText}</span>
                        <span style="font-size:0.8rem; font-weight:700;">#${order.id.slice(-6).toUpperCase()}</span>
                    </div>
                    
                    <div class="tracking-progress">
                        <div class="progress-bar-bg">
                            <div class="progress-bar-fill" style="width: ${progress}%; background-color: ${statusColor};"></div>
                        </div>
                    </div>
                    
                    <div class="tracking-items">
                        ${order.items.map(item => `
                            <div class="tracking-item-row">
                                <span>${item.qty}x ${item.nama}</span>
                                <span>${formatRp(item.harga * item.qty)}</span>
                            </div>
                        `).join('')}
                    </div>
                    
                    <div class="tracking-total">
                        <span>Total:</span>
                        <span style="color:var(--primary);">${formatRp(order.totalPrice)}</span>
                    </div>
                </div>
                `;
            }).join('');
        }

        // Logic to detect changes and play sound / show toast
        function checkOrderStatusChanges() {
            const myOrders = DB.getOrders().filter(o => o.tableNumber === tableNumber);
            const currentStr = JSON.stringify(myOrders.map(o => o.id + o.status));
            
            if (previousOrdersStr && currentStr !== previousOrdersStr) {
                // Determine what changed
                myOrders.forEach(order => {
                    if (order.status === 'ready') {
                        // It's ready! Play chime
                        document.getElementById('chime-audio').play().catch(e => console.log('Audio error'));
                        showToast(`Pesanan #${order.id.slice(-6).toUpperCase()} SIAP DIAMBIL!`, 'success');
                    } else if (order.status === 'processed') {
                        showToast(`Pesanan #${order.id.slice(-6).toUpperCase()} sedang diproses penjual.`, 'info');
                    }
                });
                
                if (!document.getElementById('view-tracking').classList.contains('hidden')) {
                    renderOrderTracking();
                }
            }
            previousOrdersStr = currentStr;
        }

        // Initialize tracking string
        previousOrdersStr = JSON.stringify(DB.getOrders().filter(o => o.tableNumber === tableNumber).map(o => o.id + o.status));

        // --- UTILS ---
        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `<p style="margin:0; font-weight:500;">${message}</p>`;
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(-20px)';
                toast.style.transition = 'all 0.3s';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }
    </script>
</body>
</html>
